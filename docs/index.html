<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Trainer-Wissensdatenbank · DJK Ottenhofen F/E-Jugend</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Trainer-Wissensdatenbank F- & E-Jugend der DJK Ottenhofen – Trainingsphilosophie, Spielformen, Übungssammlung." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sen:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    :root {
      --djk-yellow: #FFF300;
      --djk-yellow-deep: #E6DB00;
      --djk-black: #111111;
      --djk-grey: #E5E5E5;
      --theme-color: #111111;
      --sidebar-width: 290px;
    }
    * { font-family: "Sen", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { -webkit-font-smoothing: antialiased; }

    /* ---------- Sidebar ---------- */
    .sidebar {
      background: #ffffff;
      border-right: 1px solid var(--djk-grey);
      padding-top: 0;
    }
    .sidebar > h1 { margin: 0; }
    .app-name.home { padding: 0; }
    .sidebar .app-name-link {
      display: block;
      background: var(--djk-yellow);
      padding: 18px 16px;
      border-bottom: 4px solid var(--djk-black);
    }
    .sidebar .app-name-link img { max-width: 100%; height: auto; display: block; }
    .sidebar-nav { padding: 14px 12px; }
    .sidebar-nav li > a {
      color: var(--djk-black);
      font-weight: 400;
      border-radius: 6px;
      padding: 7px 10px;
      transition: background .12s ease;
    }
    .sidebar-nav li > a:hover { background: #fbf7c6; text-decoration: none; }
    .sidebar-nav li.active > a {
      color: var(--djk-black);
      font-weight: 800;
      background: var(--djk-yellow);
      border-left: 0;
    }
    .sidebar-nav li { margin: 3px 0; }

    /* ---------- Content ---------- */
    .markdown-section { max-width: 820px; }
    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3 { color: var(--djk-black); font-weight: 800; }
    .markdown-section h1 { font-size: 2rem; }
    .markdown-section h2 {
      border-bottom: 3px solid var(--djk-yellow);
      padding-bottom: 6px;
      margin-top: 2.4rem;
    }
    .markdown-section h3 { border-left: 4px solid var(--djk-yellow); padding-left: 10px; }
    .markdown-section a {
      color: var(--djk-black);
      font-weight: 700;
      border-bottom: 2px solid var(--djk-yellow);
      text-decoration: none;
    }
    .markdown-section a:hover { background: var(--djk-yellow); }
    .markdown-section strong { color: #000; }
    .markdown-section blockquote {
      border-left: 4px solid var(--djk-yellow);
      background: #fffdea;
      color: #333;
    }
    .markdown-section blockquote p { font-weight: 400; }
    .markdown-section table { display: table; width: 100%; }
    .markdown-section tr:nth-child(2n) { background: #fafafa; }
    .markdown-section th {
      background: var(--djk-yellow);
      color: var(--djk-black);
      font-weight: 800;
      border: 1px solid var(--djk-yellow-deep);
    }
    .markdown-section code {
      background: #f4f4f0;
      color: #b30059;
      border-radius: 4px;
    }
    .markdown-section pre { background: #1b1b1b; }
    .markdown-section pre > code { background: transparent; color: #f5f5f5; }

    /* section number badge look for sidebar */
    .sidebar-nav li > a { font-size: 15px; }

    /* ---------- Cover ---------- */
    section.cover.show { background: radial-gradient(circle at 30% 20%, #fffa66 0%, var(--djk-yellow) 45%, var(--djk-yellow-deep) 100%) !important; }
    section.cover .cover-main > p:last-child a {
      border-radius: 8px;
      border: 2px solid var(--djk-black);
      font-weight: 800;
      transition: all .15s ease;
    }
    section.cover .cover-main > p:last-child a:first-child {
      background: var(--djk-black);
      color: var(--djk-yellow);
    }
    section.cover .cover-main > p:last-child a:first-child:hover { background: #000; }
    section.cover .cover-main > p:last-child a:last-child {
      background: transparent;
      color: var(--djk-black);
    }
    section.cover .cover-main > p:last-child a:last-child:hover { background: rgba(0,0,0,.08); }
    section.cover h1 { color: var(--djk-black); font-weight: 800; font-size: 2.8rem; }
    section.cover blockquote p { color: #222; font-weight: 700; }
    section.cover .cover-main img { max-height: 96px; width: auto; margin-bottom: .4rem; }

    /* ---------- Search box ---------- */
    .search input {
      border: 2px solid var(--djk-grey);
      border-radius: 8px;
    }
    .search input:focus { border-color: var(--djk-yellow-deep); }
    .search .matching-post { border-bottom: 1px solid var(--djk-grey); }

    /* mobile toggle button accent */
    .sidebar-toggle { background: transparent; }
    .sidebar-toggle .sidebar-toggle-button span { background-color: var(--djk-black); }

    @media (prefers-color-scheme: dark) {
      /* keep light for the trial; DJK site is light-themed */
    }
  </style>
</head>
<body>
  <div id="app">Lädt …</div>
  <script>
    window.$docsify = {
      name: '<a class="app-name-link" href="#/"><img src="https://djk-ottenhofen.de/wp-content/uploads/2023/09/mobil_logo-2.png" alt="DJK Ottenhofen"></a>',
      nameLink: '#/',
      repo: '',
      loadSidebar: true,
      coverpage: true,
      onlyCover: false,
      homepage: 'README.md',
      auto2top: true,
      maxLevel: 3,
      subMaxLevel: 3,
      search: {
        placeholder: 'Übung oder Thema suchen …',
        noData: 'Nichts gefunden.',
        depth: 6
      },
      copyCode: {
        buttonText: 'Kopieren',
        successText: 'Kopiert'
      },
      pagination: {
        previousText: 'Zurück',
        nextText: 'Weiter',
        crossChapter: true
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@3"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
</body>
</html>
